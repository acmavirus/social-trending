services:
  mongodb:
    image: mongo:latest
    container_name: news-mongodb
    restart: always
    environment:
      MONGO_INITDB_DATABASE: social_trending
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: news-backend
    restart: always
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - DB_NAME=social_trending
      - DISCORD_WEBHOOK_URL= # Insert your Discord Webhook URL here
      - TELEGRAM_BOT_TOKEN= # Insert your Telegram Bot Token here
      - TELEGRAM_CHAT_ID= # Insert your Telegram Chat ID here
    depends_on:
      - mongodb
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - app-network


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: news-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html
      - ./frontend/style.css:/usr/share/nginx/html/style.css
      - ./frontend/app.js:/usr/share/nginx/html/app.js
    networks:
      - app-network


networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
