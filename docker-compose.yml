services:
  mongodb:
    image: mongo:latest
    container_name: news-mongodb
    restart: always
    environment:
      MONGO_INITDB_DATABASE: social_trending
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: news-backend
    restart: always
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - DB_NAME=social_trending
    depends_on:
      - mongodb
    ports:
      - "8000:8000"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: news-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
